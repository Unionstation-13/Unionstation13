services:
  mariadb:
    image: docker.io/library/mariadb:10.6
    container_name: unionstation-db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./player_data:/var/lib/mysql
    ports:
      - "3306:3306"
      - "8000:8000"
      - "5515:5515"

  us13-instance:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: union-server
    depends_on:
      - mariadb
    network_mode: "service:mariadb"
    environment:
      - LD_LIBRARY_PATH=/usr/lib:/lib/i386-linux-gnu
    volumes:
      - ${DB_PATH}:/app/config/dbconfig.txt
      - ./data:/app/data
      - ./config:/app/config

  playit-agent:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    network_mode: "service:mariadb"
    environment:
    - SECRET_KEY=${PLAYIT_KEY}
